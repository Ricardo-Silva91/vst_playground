name: Build ReverseReverb VST3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build VST3 (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReverseReverb-VST3-Windows
          path: build/ReverseReverb_artefacts/Release/VST3/ReverseReverb.vst3
          retention-days: 14

  build-mac:
    name: Build VST3 (Mac)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -G Xcode

      - name: Build
        run: cmake --build build --config Release

      # GitHub Actions destroys .vst3 bundle structure when uploading folders.
      # We zip it ourselves first so the Contents/ hierarchy is preserved inside
      # a proper ReverseReverb.vst3 wrapper when you unzip on your Mac.
      - name: Zip VST3 bundle
        run: |
          cd build/ReverseReverb_artefacts/Release/VST3
          zip -r ReverseReverb-Mac.zip ReverseReverb.vst3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReverseReverb-VST3-Mac
          path: build/ReverseReverb_artefacts/Release/VST3/ReverseReverb-Mac.zip
          retention-days: 14