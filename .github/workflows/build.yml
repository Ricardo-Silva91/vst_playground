name: Build VST

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      vst_name:
        description: 'VST to build (folder name, e.g. pitch_wobble)'
        required: true
        type: choice
        options:
          - reverse_reverb
          - pitch_wobble
          - through_the_wall
          - drum_smash
      platforms:
        description: 'Platforms to build'
        required: true
        type: choice
        default: 'mac+windows'
        options:
          - mac
          - windows
          - mac+windows

permissions:
  contents: write

jobs:
  # ── Detect which VST to build from commit message scope ──────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      vst_name: ${{ steps.parse.outputs.vst_name }}
      should_build: ${{ steps.parse.outputs.should_build }}
      build_mac: ${{ steps.parse.outputs.build_mac }}
      build_windows: ${{ steps.parse.outputs.build_windows }}
    steps:
      - name: Parse commit scope or use manual input
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VST="${{ github.event.inputs.vst_name }}"
            PLATFORMS="${{ github.event.inputs.platforms }}"
            echo "vst_name=$VST" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual trigger: building '$VST' for '$PLATFORMS'"
            # Parse platform selection
            if [[ "$PLATFORMS" == "mac" ]]; then
              echo "build_mac=true"     >> $GITHUB_OUTPUT
              echo "build_windows=false" >> $GITHUB_OUTPUT
            elif [[ "$PLATFORMS" == "windows" ]]; then
              echo "build_mac=false"    >> $GITHUB_OUTPUT
              echo "build_windows=true" >> $GITHUB_OUTPUT
            else
              echo "build_mac=true"    >> $GITHUB_OUTPUT
              echo "build_windows=true" >> $GITHUB_OUTPUT
            fi
          else
            MSG="${{ github.event.head_commit.message }}"
            echo "Commit message: $MSG"
            # Match conventional commit scope: type(scope): message
            if [[ "$MSG" =~ ^[a-zA-Z0-9_]+\(([a-zA-Z0-9_]+)\): ]]; then
              VST="${BASH_REMATCH[1]}"
              echo "vst_name=$VST" >> $GITHUB_OUTPUT
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "Detected scope: '$VST' — defaulting to mac only"
              # Push commits default to mac only
              echo "build_mac=true"     >> $GITHUB_OUTPUT
              echo "build_windows=false" >> $GITHUB_OUTPUT
            else
              echo "vst_name=" >> $GITHUB_OUTPUT
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "build_mac=false"    >> $GITHUB_OUTPUT
              echo "build_windows=false" >> $GITHUB_OUTPUT
              echo "No scope found — skipping build."
            fi
          fi

  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    needs: detect
    if: needs.detect.outputs.should_build == 'true' && needs.detect.outputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        working-directory: ${{ needs.detect.outputs.vst_name }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: ${{ needs.detect.outputs.vst_name }}
        run: cmake --build build --config Release

      - name: Zip VST3 bundle (Windows)
        working-directory: ${{ needs.detect.outputs.vst_name }}
        shell: bash
        run: |
          cd build
          VST3_PATH=$(find . -name "*.vst3" -type d | head -n 1)
          ZIP_NAME=$(basename "$VST3_PATH" | tr ' ' '_')_Windows.zip
          7z a "$ZIP_NAME" "$VST3_PATH"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload VST3 artifact (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.vst_name }}-VST3-Windows
          path: ${{ needs.detect.outputs.vst_name }}/build/*_Windows.zip

  # ── macOS build ───────────────────────────────────────────────────────────
  build-mac:
    needs: detect
    if: needs.detect.outputs.should_build == 'true' && needs.detect.outputs.build_mac == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        working-directory: ${{ needs.detect.outputs.vst_name }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: ${{ needs.detect.outputs.vst_name }}
        run: cmake --build build --config Release

      - name: Zip VST3 bundle (preserve macOS bundle structure)
        working-directory: ${{ needs.detect.outputs.vst_name }}
        run: |
          cd build
          VST3_PATH=$(find . -name "*.vst3" -type d | head -n 1)
          ZIP_NAME=$(basename "$VST3_PATH" | tr ' ' '_')_Mac.zip
          zip -r "$ZIP_NAME" "$VST3_PATH"

      - name: Upload VST3 artifact (Mac)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.detect.outputs.vst_name }}-VST3-Mac
          path: ${{ needs.detect.outputs.vst_name }}/build/*_Mac.zip

  # ── Publish release (runs after both builds, avoids race condition) ───────
  publish:
    needs: [detect, build-mac, build-windows]
    # Run if at least one build was requested and at least one succeeded
    if: |
      always() &&
      needs.detect.outputs.should_build == 'true' &&
      (needs.build-mac.result == 'success' || needs.build-mac.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-mac.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts for this VST
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.detect.outputs.vst_name }}-VST3-*
          path: release-assets
          merge-multiple: true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.vst_name }}-latest
          name: "${{ needs.detect.outputs.vst_name }} (latest)"
          body: "Latest automated build of **${{ needs.detect.outputs.vst_name }}**."
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}